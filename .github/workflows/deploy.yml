name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy and build on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            PROJECT_DIR="/var/www/strona-prawnicza"
            
            # First-time setup: clone repo if not a git repo
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Initial clone..."
              rm -rf "$PROJECT_DIR"
              git clone https://github.com/ElDynamo/kancelariaabw.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            else
              cd "$PROJECT_DIR"
              
              # Backup client-edited content before pull
              BACKUP_NAME="content-backup-$(date +%Y%m%d_%H%M%S)"
              mkdir -p "/tmp/$BACKUP_NAME"
              cp -a src/content/. "/tmp/$BACKUP_NAME/" 2>/dev/null || true
              echo "Content backed up to /tmp/$BACKUP_NAME"
              
              # Pull latest code
              git fetch origin master
              git checkout master
              git reset --hard origin/master
              
              # Restore client content over git version
              if [ -d "/tmp/$BACKUP_NAME" ]; then
                cp -a "/tmp/$BACKUP_NAME/." src/content/
                echo "Client content restored"
              fi
            fi
            
            # Write .env for Docker Compose
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" > .env

            # Stop old PM2 process if it exists (one-time migration)
            pm2 stop kancelaria-abw 2>/dev/null || true
            pm2 delete kancelaria-abw 2>/dev/null || true
            
            # Build and restart with Docker
            docker compose up -d --build --force-recreate
            
            # Wait and verify
            sleep 5
            if curl -s -f http://127.0.0.1:4321/ > /dev/null; then
              echo "✅ Deploy complete! Container is responding."
            else
              echo "❌ Container failed to respond. Logs:"
              docker compose logs --tail=30
              exit 1
            fi
