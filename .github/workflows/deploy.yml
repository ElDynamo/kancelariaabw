name: Deploy to VPS

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}:latest
          build-args: |
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy and start on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            PROJECT_DIR="/var/www/strona-prawnicza"
            
            # Lowercase for github.repository manually in bash
            REPO="${{ github.repository }}"
            REPO_LC="${REPO,,}"
            IMAGE="ghcr.io/$REPO_LC:latest"
            
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Initial clone..."
              rm -rf "$PROJECT_DIR"
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi
            
            cd "$PROJECT_DIR"
            git fetch origin master
            git reset --hard origin/master
            
            # Write .env for Docker Compose
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" > .env
            
            # Stop old PM2 process if it exists (one-time migration)
            pm2 stop kancelaria-abw 2>/dev/null || true
            pm2 delete kancelaria-abw 2>/dev/null || true
            
            # Login to GHCR to pull image (needed if repo is private)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest image & recreate
            docker pull $IMAGE
            docker compose up -d --force-recreate
            
            # Clean up old unused images to save disk space
            docker image prune -f
            
            # Wait and verify
            sleep 5
            if curl -s -f http://127.0.0.1:4321/ > /dev/null; then
              echo "✅ Deploy complete! Container is responding."
            else
              echo "❌ Container failed to respond. Logs:"
              docker compose logs --tail=30
              exit 1
            fi
