name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy and build on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.bun/bin:$PATH"
            
            PROJECT_DIR="/var/www/strona-prawnicza"
            
            # First-time setup: clone repo if not a git repo
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "Initial clone..."
              rm -rf "$PROJECT_DIR"
              git clone https://github.com/ElDynamo/kancelariaabw.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            else
              cd "$PROJECT_DIR"
              
              # Backup client-edited content before pull
              BACKUP_NAME="content-backup-$(date +%Y%m%d_%H%M%S)"
              cp -r src/content "/tmp/$BACKUP_NAME" 2>/dev/null || true
              echo "Content backed up to /tmp/$BACKUP_NAME"
              
              # Pull latest code
              git fetch origin master
              git checkout master
              git reset --hard origin/master
              
              # Restore client content over git version
              if [ -d "/tmp/$BACKUP_NAME" ]; then
                cp -rf "/tmp/$BACKUP_NAME"/* src/content/
                echo "Client content restored"
              fi
            fi
            
            # Install and build
            bun install
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} bun run build
            
            # Restart server
            pm2 restart kancelaria-abw || pm2 start ecosystem.config.cjs
            pm2 save
            
            echo "Deploy complete!"
