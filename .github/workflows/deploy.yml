name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Astro project
        run: bun run build
        env:
          # Jeżeli klucz Resend jest też używany podczas budowy, podajemy go tu.
          # Dla bezpieczeństwa powinien być w secretach.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          # Kopiujemy katalog dist oraz pliki konfiguracyjne do uruchomienia
          source: "dist/,ecosystem.config.cjs,package.json"
          target: "/var/www/kancelariaabw"
          strip_components: 0

      - name: Restart PM2 on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/kancelariaabw
            # Wymagany PM2 zainstalowany globalnie u użytkownika ubuntu
            pm2 start ecosystem.config.cjs || pm2 restart kancelaria-abw
            pm2 save
