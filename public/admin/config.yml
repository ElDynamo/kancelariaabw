backend:
  name: git-gateway
  branch: master

# Lokalne testowanie (odkomentuj żeby testować bez autentykacji)
# local_backend: true

media_folder: "public/photos"
public_folder: "/photos"

locale: "pl"

collections:
  # ===== SINGLETONY (Settings) =====
  - name: "homepage"
    label: "🏠 Strona Główna"
    files:
      - name: "homepage"
        label: "Strona Główna"
        file: "src/content/singletons/homepage.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tytuł", name: "title", widget: "string" }
              - { label: "Podtytuł", name: "subtitle", widget: "string" }
              - { label: "Opis", name: "description", widget: "text" }
              - { label: "Zdjęcie", name: "image", widget: "image", required: false }
          - label: "O mnie"
            name: "about"
            widget: "object"
            fields:
              - { label: "Paragraf 1", name: "description1", widget: "text" }
              - { label: "Paragraf 2", name: "description2", widget: "text" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Pytanie", name: "question", widget: "string" }
              - { label: "Odpowiedź", name: "answer", widget: "text" }

  - name: "settings"
    label: "⚙️ Ustawienia"
    files:
      - name: "contact"
        label: "Kontakt"
        file: "src/content/singletons/contact.json"
        fields:
          - { label: "Telefon", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Godziny pracy", name: "hours", widget: "string" }
          - { label: "Lokalizacje", name: "locations", widget: "string" }
          - label: "Nawigacja (Nagłówek)"
            name: "headerNav"
            widget: "list"
            fields:
              - { label: "Etykieta", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
          - label: "Linki (Stopka)"
            name: "footerNav"
            widget: "list"
            fields:
              - { label: "Etykieta", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }

      - name: "pricing"
        label: "Cennik"
        file: "src/content/singletons/pricing.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tytuł", name: "title", widget: "string" }
              - { label: "Podtytuł", name: "subtitle", widget: "string" }
              - { label: "Opis", name: "description", widget: "text" }
          - label: "Pozycje cennika"
            name: "pricingList"
            widget: "list"
            fields:
              - { label: "Usługa", name: "service", widget: "string" }
              - { label: "Cena", name: "price", widget: "string" }
              - { label: "Uwaga", name: "note", widget: "string", required: false }
          - { label: "Ważne informacje", name: "importantInfo", widget: "list", field: { label: "Info", name: "info", widget: "string" } }

      - name: "about"
        label: "O mnie"
        file: "src/content/singletons/about.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tytuł", name: "title", widget: "string" }
              - { label: "Podtytuł", name: "subtitle", widget: "string" }
              - { label: "Opis", name: "description", widget: "text" }
              - { label: "Zdjęcie", name: "image", widget: "image", required: false }
          - { label: "Treść", name: "aboutParagraphs", widget: "text" }
          - label: "Cytat"
            name: "quote"
            widget: "object"
            fields:
              - { label: "Treść", name: "text", widget: "text" }
              - { label: "Autor", name: "author", widget: "string" }

  # ===== KOLEKCJE =====
  - name: "blog"
    label: "📝 Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Tytuł", name: "title", widget: "string" }
      - { label: "Opis SEO", name: "description", widget: "text" }
      - { label: "Data publikacji", name: "publishDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Kategoria", name: "category", widget: "select", options: ["Prawo rodzinne", "Prawo cywilne", "Prawo karne", "Prawo nieruchomości", "Prawo upadłościowe", "Odszkodowania", "Prawo gospodarcze", "Porady ogólne"] }
      - { label: "Tagi", name: "tags", widget: "list" }
      - { label: "Autor", name: "author", widget: "string", default: "anna-jarczynska" }
      - { label: "Szkic", name: "draft", widget: "boolean", default: false }
      - { label: "Treść", name: "body", widget: "markdown" }

  - name: "uslugi"
    label: "⚖️ Usługi Prawne"
    folder: "src/content/uslugi"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Tytuł", name: "title", widget: "string" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        fields:
          - { label: "Opis Meta", name: "description", widget: "text" }
      - label: "Hero"
        name: "hero"
        widget: "object"
        fields:
          - { label: "Tytuł", name: "title", widget: "string" }
          - { label: "Podtytuł", name: "subtitle", widget: "string", required: false }
          - { label: "Opis", name: "description", widget: "text" }
          - { label: "Zdjęcie", name: "image", widget: "image", required: false }
      - label: "Cechy"
        name: "features"
        widget: "list"
        required: false
        fields:
          - { label: "Ikona", name: "icon", widget: "string", required: false }
          - { label: "Tytuł", name: "title", widget: "string" }
          - { label: "Opis", name: "desc", widget: "text" }
      - label: "Etapy"
        name: "steps"
        widget: "list"
        required: false
        fields:
          - { label: "Tytuł", name: "title", widget: "string" }
          - { label: "Opis", name: "desc", widget: "text" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - { label: "Pytanie", name: "question", widget: "string" }
          - { label: "Odpowiedź", name: "answer", widget: "text" }
      - { label: "Treść", name: "body", widget: "markdown" }

  - name: "legal"
    label: "📄 Strony prawne"
    folder: "src/content/legal"
    create: false
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Tytuł", name: "title", widget: "string" }
      - { label: "Ostatnia aktualizacja", name: "lastUpdated", widget: "string" }
      - { label: "Treść", name: "body", widget: "markdown" }

  - name: "authors"
    label: "👤 Autorzy"
    folder: "src/content/authors"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Imię i nazwisko", name: "name", widget: "string" }
      - { label: "Stanowisko", name: "role", widget: "string" }
      - { label: "Biogram", name: "bio", widget: "text" }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Zdjęcie", name: "photo", widget: "image", required: false }

  - name: "toolsInfo"
    label: "🧮 Kalkulatory"
    folder: "src/content/toolsInfo"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Tytuł", name: "title", widget: "string" }
      - { label: "Opis", name: "desc", widget: "text" }
      - { label: "Fraza kluczowa", name: "fraza", widget: "string", required: false }
      - { label: "Ikona (SVG)", name: "icon", widget: "text", required: false }
      - { label: "Grafika", name: "image", widget: "image", required: false }
